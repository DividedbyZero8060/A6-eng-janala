<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Janala</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <style>
        .font-poppins {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="font-poppins">
    <!-- nav section -->
     <section id="nav-section" class="bg-[#BADEFF26] py-4 px-8 flex items-center justify-between">
        <div class="flex bg-white">
            <h1 class="text-xl">English</h1>
            <img class="w-8" src="assets/logo.png" alt="">
            <h1 class="text-xl">জানালা</h1>
        </div>
        <div class="flex gap-4">
            <button class="btn border-[#422AD5] text-[#422AD5]"><img src="assets/fa-circle-question.png" alt=""> FAQ</button>

            <button class="btn border-[#422AD5] text-[#422AD5]"><img src="assets/fa-book-open.png" alt=""> Learn</button>
            <button class="btn border-[#422AD5] text-[#422AD5]"><img src="assets/fa-arrow-right-from-bracket.png" alt=""> Logout</button>
        </div>
     </section>
     <!-- hero section  -->
     <section id="hero-section" class="bg-white hero bg-base-200 min-h-screen">
            <div class="hero-content flex-col lg:flex-row-reverse gap-4">
                <img
                src="assets/hero-student.png"
                class="max-w-lg rounded-lg "
                />
                <div class="mx-4">
                <h1 class="text-5xl font-bold"><span class="text-blue-400">English</span> is Easy!!</h1>
                <p class="py-6">
                    আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ
                </p>
                <fieldset class="fieldset py-4">

                <input type="email" class="input" placeholder="Enter your email" />

                <input type="password" class="input" placeholder="Password" />

                <button id="login-btn" class="btn bg-[#422AD5] text-white mt-4 w-fit">Get Started</button>
                </fieldset>
                </div>
            </div>
     </section>
     <!-- cards section -->
     <section class="cards-section">
        <h1 class="text-2xl text-center font-bold"><span class="text-blue-400">Let's</span> Learn Vocabularies</h1>
        <div class="btn-container">
            
        </div>
        <div class="cards-container">
        </div>
     </section>
    <script src="scripts/index.js"></script>
</body>
</html>
